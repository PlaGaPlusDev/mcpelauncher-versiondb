name: Scrape wiki for new versions

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run scraper
        run: python3 wiki_scraper.py .
      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add versions.json versions.*.json.min
          git diff --cached --quiet || (git commit -m "Auto-update versions from wiki" && git push)
